services:
  app:
    build:
      context: ../..
      dockerfile: apps/help-server/Dockerfile
    restart: unless-stopped
    ports:
      - '3008:3008'
    volumes:
      - ../..:/app
      - ../../docs:/docs:ro
      - ../../plugins:/plugins:ro
      - ../../rules:/rules:ro
      - ../../skills:/skills:ro
      - ../../.claude-plugin:/.claude-plugin:ro
      - ~/.claude:/root/.claude:ro
      - /app/node_modules
      - /app/apps/help-server/dist
    environment:
      - NODE_ENV=development
      - RUNNING_IN_DOCKER=true
    command: yarn workspace helper-server dev
