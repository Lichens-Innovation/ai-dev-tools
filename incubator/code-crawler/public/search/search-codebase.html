<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Crawler — semantic search</title>
    <link rel="stylesheet" href="search-codebase.css" />
    <link rel="stylesheet" href="highlight-github-dark.min.css" />
  </head>

  <body>
    <div class="api-item">
      <div class="semantic-search-layout">
        <div class="semantic-search-query">
          <div class="field-row semantic-search-query__field">
            <div class="input-group semantic-search-query__input input-group--search-overlay">
              <textarea id="query-text" spellcheck="true" aria-label="Natural language query" placeholder="e.g. tanstack query returning a list of items with an infinite staleTime"></textarea>
              <button class="test-button test-button--textarea-overlay-bottom" type="button" id="search-button">Search</button>
            </div>
          </div>
        </div>

        <aside class="semantic-search-options" aria-label="Search options">
          <div class="field-row field-row--inline">
            <label class="field-label" for="nb-results">Number of results (1–50)</label>
            <input id="nb-results" type="number" min="1" max="50" value="10" class="field-input-number" />
          </div>
          <div class="field-row">
            <label class="field-label" for="repository-filter">Repository (optional)</label>
            <input
              id="repository-filter"
              type="text"
              class="field-input-text semantic-search-options__repo-input"
              placeholder="Repository folder name, e.g. ai-dev-tools"
              spellcheck="false"
              autocomplete="off"
            />
          </div>
        </aside>
      </div>
    </div>

    <div class="search-results-shell api-item" aria-live="polite">
      <div class="search-status-bar" id="search-status" role="status"></div>
      <div class="search-error" id="search-error" role="alert" hidden></div>

      <div class="search-master-detail" id="search-master-detail">
        <div class="search-results-column">
          <div class="row-actions search-results-column__header">
            <span class="search-results-column__title">Matches</span>
          </div>
          <ul class="search-results-list" id="search-results-list"></ul>
        </div>

        <aside class="search-detail-panel" id="search-detail-panel" aria-label="Selected match code">
          <div class="search-detail-panel__placeholder" id="search-detail-placeholder">
            Select a match to view the full file.
          </div>
          <div class="search-detail-panel__content" id="search-detail-content" hidden>
            <header class="search-detail-panel__header">
              <div class="search-detail-panel__meta">
                <span class="search-detail-panel__path" id="detail-path"></span>
              </div>
              <button type="button" class="test-button test-button--small" id="detail-copy-path">Copy full path</button>
            </header>
            <pre class="search-detail-panel__pre search-detail-panel__pre--lined"><span class="search-detail-line-gutter" id="detail-line-gutter" aria-hidden="true"></span><code class="hljs" id="detail-code"></code></pre>
          </div>
        </aside>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js" crossorigin="anonymous"></script>
    <script src="search-codebase.js"></script>
  </body>
</html>
