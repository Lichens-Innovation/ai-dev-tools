<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Crawler — semantic search</title>
    <link rel="stylesheet" href="/search-codebase.css" />
  </head>
  <body>
    <div class="api-item">
      <div class="semantic-search-layout">
        <div class="semantic-search-query">
          <div class="field-row semantic-search-query__field">
            <label class="field-label" for="query-text">Semantic code search</label>
            <div class="input-group semantic-search-query__input input-group--search-overlay">
              <textarea id="query-text" spellcheck="true" rows="5" aria-label="Natural language query" placeholder="e.g. Where is the REST API controller defined?"></textarea>
              <button class="test-button test-button--textarea-overlay-bottom" type="button" id="search-button">Search</button>
            </div>
          </div>
        </div>

        <aside class="semantic-search-options" aria-label="Search options">
          <div class="field-row">
            <label class="field-label" for="nb-results">Number of results (1–50)</label>
            <input id="nb-results" type="number" min="1" max="50" value="10" class="field-input-number" />
          </div>
          <div class="field-row">
            <label class="field-label" for="repository-filter">Repository (optional)</label>
            <input
              id="repository-filter"
              type="text"
              class="field-input-text semantic-search-options__repo-input"
              placeholder="Repository folder name, e.g. ai-dev-tools"
              spellcheck="false"
              autocomplete="off"
            />
          </div>
          <p class="hint semantic-search-options__hint">Leave Repository empty to search across all indexed repositories.</p>
        </aside>
      </div>
    </div>

    <div class="row-actions">
      <span>Results</span>
    </div>
    <div id="result"></div>

    <script src="/search-codebase.js"></script>
  </body>
</html>
