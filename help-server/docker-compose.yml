services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '3008:3008'
    volumes:
      - .:/app
      - ../docs:/docs:ro
      - ../plugins:/plugins:ro
      - ../rules:/rules:ro
      - ../skills:/skills:ro
      - ../.claude-plugin:/.claude-plugin:ro
      - ~/.claude:/root/.claude:ro
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
    command: yarn dev
